<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boaz Hoek</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Custom cursor ─── */
    @media (pointer: fine) {
      * { cursor: none !important; }
      .divider-handle { cursor: col-resize !important; }
    }
    #cursor {
      position: fixed; top: 0; left: 0; z-index: 9999;
      pointer-events: none; width: 0; height: 0;
    }
    #cursor-crosshair {
      position: absolute;
      width: 16px; height: 16px;
      transform: translate(-50%, -50%);
      transition: transform .1s ease;
    }
    #cursor-crosshair::before,
    #cursor-crosshair::after {
      content: ''; position: absolute; background: #111;
    }
    #cursor-crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
    #cursor-crosshair::after  { width: 100%; height: 1px; top: 50%; left: 0; }
    body.cursor-hover    #cursor-crosshair { transform: translate(-50%, -50%) rotate(45deg) scale(1.5); }
    body.cursor-resizing #cursor-crosshair { transform: translate(-50%, -50%) rotate(90deg) scale(1.4); }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #111; background: #fff; font-size: 13px;
      line-height: 1.3; overflow: hidden; height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    ::selection { background: #111; color: #f0f0f0; }

    .app {
      display: flex; flex-direction: column;
      height: 100vh; width: 100vw;
    }

    /* ─── Mobile header ─── */
    .mobile-header {
      display: none; flex-shrink: 0;
      justify-content: space-between; align-items: center;
      padding: 8px 10px 7px; border-bottom: 1px solid #111;
      font-size: 14px; background: #fff; z-index: 50;
    }
    .mobile-header-right { display: flex; gap: 14px; align-items: center; }
    .mobile-header-right a, .mobile-header-right button {
      background: none; border: none; font: inherit; font-size: 14px; color: #111;
    }
    .mobile-header-right a:hover, .mobile-header-right button:hover { text-decoration: underline; }

    .body { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* ─── Left pane ─── */
    .left-pane {
      width: 50%; display: flex; flex-direction: column;
      overflow: hidden; flex-shrink: 0;
      background: #f7f7f7; /* Slight grey difference */
      border-right: 1px solid #111;
    }

    .artist-name-row {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 5px 10px; border-bottom: 1px solid #111;
      flex-shrink: 0;
    }
    .artist-name { font-size: 13px; font-weight: 500; }
    .info-toggle {
      background: none; border: none; font: inherit;
      font-size: 13px; font-weight: 500; color: #111;
    }
    .info-toggle:hover { opacity: .5; }

    .info-dropdown {
      overflow: hidden;
      max-height: 0;
      flex-shrink: 0;
      transition: max-height .3s ease;
    }
    .info-dropdown.open {
      max-height: 220px;
      border-bottom: 1px solid #111;
    }
    .info-dropdown-inner { padding: 14px 10px 18px; font-size: 13px; line-height: 1.9; }

    /* ─── Table ─── */
    .table-header {
      display: grid; grid-template-columns: 40% 37% 23%;
      padding: 7px 10px 6px; border-bottom: 1px solid #111;
      font-weight: 500; font-size: 13px; background: #f7f7f7; flex-shrink: 0;
    }
    .works-list { flex: 1; overflow-y: auto; }
    .works-list::-webkit-scrollbar { width: 3px; }
    .works-list::-webkit-scrollbar-thumb { background: #ccc; }

    .work-row {
      display: grid; grid-template-columns: 40% 37% 23%;
      padding: 6px 10px 5px; border-bottom: 1px solid #111;
      font-size: 13px; align-items: start;
      transition: background .1s ease;
    }
    .work-row:hover { background: rgba(0,0,0,.03); }
    .work-row.active { background: #111; color: #fff; }

    /* ─── Divider handle ─── */
    .divider-handle {
      width: 1px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
      cursor: col-resize !important;
      background: #111;
    }

    /* ─── Right pane ─── */
    .right-pane { flex: 1; overflow-y: auto; background: #fff; padding: 18px 16px 10px; min-width: 0; }
    .right-pane::-webkit-scrollbar { width: 3px; }
    .right-pane::-webkit-scrollbar-thumb { background: #ccc; }

    /* ─── Feed ─── */
    .feed-item { margin-bottom: 44px; }
    .feed-item img {
      width: 100%; height: auto; display: block;
      transition: opacity .15s ease;
    }
    .feed-item img:hover { opacity: .85; }
    .feed-item-meta {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-top: 9px; font-size: 13px; font-weight: 500;
    }
    .feed-item-medium { font-size: 12px; color: #888; margin-top: 4px; }

    /* ─── Detail view ─── */
    .detail-view { display: none; }
    .detail-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 18px; font-size: 13px; font-weight: 500;
    }
    .detail-back {
      background: none; border: none; font: inherit; font-size: 13px;
      color: #111; text-transform: uppercase; cursor: none !important;
    }
    .detail-back:hover { text-decoration: underline; }
    .detail-main-img { width: 100%; height: auto; display: block; margin-bottom: 22px; }
    .detail-text { font-size: 13px; line-height: 1.8; color: #333; max-width: 600px; white-space: pre-wrap; }

    /* ─── Mobile ─── */
    @media (max-width: 767px) {
      #cursor { display: none; }
      body { overflow: auto; }
      .app { height: auto; }
      .mobile-header { display: flex; }
      .body { flex-direction: column; }
      .left-pane { width: 100% !important; border-right: none; display: none; }
      .left-pane.mobile-open { display: flex; }
      .divider-handle { display: none; }
      .right-pane { padding: 10px 8px; overflow: visible; width: 100%; }
    }
  </style>
</head>
<body>

<div id="cursor"><div id="cursor-crosshair"></div></div>

<div class="app" id="app">
  <div class="mobile-header">
    <div id="mobile-artist-name">Boaz Hoek</div>
    <div class="mobile-header-right">
      <a href="#" class="ig-link">Instagram</a>
      <button onclick="toggleMobileMenu()">Menu</button>
    </div>
  </div>

  <div class="body" id="body">
    <div class="left-pane" id="left-pane">
      <div class="artist-name-row">
        <div class="artist-name" id="artist-name-display">Boaz Hoek</div>
        <button class="info-toggle" id="info-toggle-btn" onclick="toggleInfo()">Info</button>
      </div>
      <div class="info-dropdown" id="info-dropdown">
        <div class="info-dropdown-inner">
          <p id="bio-text"></p>
          <div id="contact-block"></div>
        </div>
      </div>
      <div class="table-header">
        <div>Title</div>
        <div>Series</div>
        <div>Year</div>
      </div>
      <div class="works-list" id="works-list"></div>
    </div>

    <div class="divider-handle" id="divider-handle"></div>

    <div class="right-pane" id="right-pane">
      <div id="works-feed"></div>
      <div class="detail-view" id="detail-view">
        <div class="detail-header">
          <div id="detail-title"></div>
          <button class="detail-back" onclick="closeDetail()">← Back</button>
        </div>
        <img class="detail-main-img" id="detail-img" src="" alt="">
        <div class="detail-text" id="detail-desc"></div>
      </div>
    </div>
  </div>
</div>

<script>
let lastFeedScrollPos = 0;

// Cursor
(function() {
  const el = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    el.style.left = e.clientX + 'px';
    el.style.top  = e.clientY + 'px';
  });
  document.addEventListener('mouseover', e => {
    if (e.target.closest('a, button, .work-row, img')) document.body.classList.add('cursor-hover');
    else document.body.classList.remove('cursor-hover');
  });
})();

// Divider
(function() {
  const handle = document.getElementById('divider-handle');
  const left = document.getElementById('left-pane');
  let dragging = false;
  handle.addEventListener('mousedown', () => { dragging = true; document.body.classList.add('cursor-resizing'); });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    left.style.width = e.clientX + 'px';
  });
  document.addEventListener('mouseup', () => { dragging = false; document.body.classList.remove('cursor-resizing'); });
})();

function toggleInfo() {
  const d = document.getElementById('info-dropdown');
  const b = document.getElementById('info-toggle-btn');
  const open = d.classList.toggle('open');
  b.textContent = open ? 'Close' : 'Info';
}

function toggleMobileMenu() {
  document.getElementById('left-pane').classList.toggle('mobile-open');
}

function resolveImageSrc(img) {
  if (!img) return '';
  return typeof img === 'string' ? img : (img.type === 'base64' ? img.data : 'images/' + img.name);
}

function openDetail(item, clickedImg) {
  const feed = document.getElementById('works-feed');
  const detail = document.getElementById('detail-view');
  const rightPane = document.getElementById('right-pane');
  const detailImg = document.getElementById('detail-img');

  lastFeedScrollPos = rightPane.scrollTop;
  
  document.getElementById('detail-title').textContent = item.title + (item.year ? ' — ' + item.year : '');
  detailImg.src = resolveImageSrc(item.image);
  document.getElementById('detail-desc').textContent = item.description || '';

  if (clickedImg) {
    const startRect = clickedImg.getBoundingClientRect();
    const clone = clickedImg.cloneNode(true);
    
    clone.style.position = 'fixed';
    clone.style.top = startRect.top + 'px';
    clone.style.left = startRect.left + 'px';
    clone.style.width = startRect.width + 'px';
    clone.style.zIndex = '1000';
    clone.style.transition = 'all 0.25s cubic-bezier(0.4, 0, 0.2, 1)';
    document.body.appendChild(clone);

    clickedImg.style.visibility = 'hidden';
    feed.style.display = 'none';
    detail.style.display = 'block';
    rightPane.scrollTop = 0;
    detailImg.style.visibility = 'hidden';

    const targetRect = detailImg.getBoundingClientRect();

    requestAnimationFrame(() => {
      clone.style.top = targetRect.top + 'px';
      clone.style.left = targetRect.left + 'px';
      clone.style.width = targetRect.width + 'px';
    });

    setTimeout(() => {
      detailImg.style.visibility = 'visible';
      clickedImg.style.visibility = 'visible';
      clone.remove();
    }, 250);
  } else {
    feed.style.display = 'none';
    detail.style.display = 'block';
    rightPane.scrollTop = 0;
  }
}

function closeDetail() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('works-feed').style.display = 'block';
  document.getElementById('right-pane').scrollTop = lastFeedScrollPos;
}

function renderApp(items, data) {
  document.getElementById('bio-text').textContent = data.bio;
  document.getElementById('works-list').innerHTML = items.map(i => 
    `<div class="work-row" onclick='openDetail(${JSON.stringify(i)})'><span>${i.title}</span><span>${i.series||''}</span><span>${i.year||''}</span></div>`
  ).join('');
  document.getElementById('works-feed').innerHTML = items.map(i => 
    `<div class="feed-item"><img src="${resolveImageSrc(i.image)}" onclick='openDetail(${JSON.stringify(i)}, this)'><div class="feed-item-meta"><span>${i.title}</span><span>${i.year||''}</span></div></div>`
  ).join('');
}

// Dummy Load
window.onload = () => {
  renderApp([
    {id: 1, title: 'No Medals, No Ribbons', year: 2026, series: 'Works', image: 'https://via.placeholder.com/800x600', description: 'Sample description.'}
  ], {bio: 'Artist based in Haarlem.'});
};
</script>
</body>
</html>
