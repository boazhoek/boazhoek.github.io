<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boaz Hoek</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Custom cursor ─── */
    @media (pointer: fine) {
      * { cursor: none !important; }
      .divider-handle { cursor: col-resize !important; }
    }
    #cursor {
      position: fixed; top: 0; left: 0; z-index: 9999;
      pointer-events: none; width: 0; height: 0;
    }
    #cursor-crosshair {
      position: absolute;
      width: 16px; height: 16px;
      transform: translate(-50%, -50%);
    }
    #cursor-crosshair::before,
    #cursor-crosshair::after {
      content: ''; position: absolute; background: #111;
    }
    #cursor-crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
    #cursor-crosshair::after  { width: 100%; height: 1px; top: 50%; left: 0; }
    body.cursor-hover    #cursor-crosshair { transform: translate(-50%, -50%) rotate(45deg) scale(1.5); }
    body.cursor-resizing #cursor-crosshair { transform: translate(-50%, -50%) rotate(90deg) scale(1.4); }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #111; background: #fff; font-size: 13px;
      line-height: 1.3; overflow: hidden; height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    .app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

    /* ─── Mobile header ─── */
    .mobile-header {
      display: none; flex-shrink: 0;
      justify-content: space-between; align-items: center;
      padding: 8px 10px 7px; border-bottom: 1px solid #111;
      font-size: 14px; background: #fff; z-index: 50;
    }
    .mobile-header-right { display: flex; gap: 14px; align-items: center; }
    .mobile-header-right button { background: none; border: none; font: inherit; color: #111; }

    .body { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* ─── Left pane (Subtle Grey) ─── */
    .left-pane {
      width: 50%; display: flex; flex-direction: column;
      overflow: hidden; flex-shrink: 0;
      background: #f4f4f4; /* Grey distinction */
      border-right: 1px solid #111;
    }

    .artist-name-row {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 5px 10px; border-bottom: 1px solid #111;
      flex-shrink: 0; background: #f4f4f4;
    }
    .info-toggle { background: none; border: none; font: inherit; font-weight: 500; color: #111; text-decoration: none; transition: text-decoration .15s; }
    .info-toggle:hover { text-decoration: underline; }
    .info-toggle.active { text-decoration: underline; }

    .info-dropdown {
      overflow: hidden; max-height: 0; flex-shrink: 0;
      transition: max-height .25s ease-out;
    }
    .info-dropdown.open { max-height: 300px; border-bottom: 1px solid #111; }
    .info-dropdown-inner { padding: 14px 10px 18px; font-size: 13px; line-height: 1.8; }

    /* ─── Table ─── */
    .table-header {
      display: grid; grid-template-columns: 40% 37% 23%;
      padding: 7px 10px 6px; border-bottom: 1px solid #111;
      font-weight: 500; background: #f4f4f4; flex-shrink: 0;
    }
    .table-header > div:last-child { text-align: right; }
    .works-list { flex: 1; overflow-y: auto; }
    .work-row {
      display: grid; grid-template-columns: 40% 37% 23%;
      padding: 6px 10px 5px; border-bottom: 1px solid #111;
    }
    .work-row > span:last-child { text-align: right; }
    .work-row:hover { background: rgba(0,0,0,.04); }
    .work-row.active { background: rgba(0,0,0,.04); }

    /* ─── Divider ─── */
    .divider-handle {
      width: 12px;
      background: transparent;
      z-index: 10;
      cursor: col-resize !important;
      position: relative;
    }
    .divider-handle::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 1px;
      height: 100%;
      background: #111;
      pointer-events: none;
    }

    /* ─── Right pane (White) ─── */
    .right-pane { flex: 1; overflow-y: auto; background: #fff; padding: 8px 6px 4px; }

    /* ─── Feed ─── */
    .feed-item { margin-bottom: 40px; }
    .feed-item img { width: 100%; height: auto; display: block; }
    .feed-item img:hover { opacity: 0.9; }
    .feed-item-meta { display: flex; justify-content: space-between; margin-top: 8px; font-weight: 500; }
    .feed-item-medium { font-size: 12px; color: #888; margin-top: 2px; }

    /* ─── Detail view (Instant) ─── */
    .detail-view { display: none; }
    .detail-header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 500; }
    .detail-back { background: none; border: none; font: inherit; text-transform: uppercase; }
    .detail-back:hover { text-decoration: underline; }
    .detail-main-img { width: 100%; height: auto; display: block; margin-bottom: 20px; }
    .detail-text { font-size: 13px; line-height: 1.8; color: #333; max-width: 650px; white-space: pre-wrap; }

    .loading { padding: 20px; color: #999; }

    /* ─── Mobile ─── */
    @media (max-width: 767px) {
      #cursor { display: none; }
      .mobile-header { display: flex; }
      .left-pane { width: 100% !important; display: none; border-right: none; }
      .left-pane.mobile-open { display: flex; }
      .divider-handle { display: none; }
      .right-pane { width: 100%; padding: 10px; }
    }
  </style>
</head>
<body>

<div id="cursor"><div id="cursor-crosshair"></div></div>

<div class="app" id="app">
  <div class="mobile-header">
    <div id="mobile-artist-name">Boaz Hoek</div>
    <div class="mobile-header-right">
      <button id="mobile-menu-btn" onclick="toggleMobileMenu()">Menu</button>
    </div>
  </div>

  <div class="body" id="body">
    <div class="left-pane" id="left-pane">
      <div class="artist-name-row">
        <div class="artist-name" id="artist-name-display">Boaz Hoek</div>
        <button class="info-toggle" id="info-toggle-btn" onclick="toggleInfo()">Info</button>
      </div>
      <div class="info-dropdown" id="info-dropdown">
        <div class="info-dropdown-inner">
          <p id="bio-text"></p>
          <div id="contact-block"></div>
        </div>
      </div>
      <div class="table-header"><div>Title</div><div>Series</div><div>Year</div></div>
      <div class="works-list" id="works-list"><div class="loading">Loading works...</div></div>
    </div>

    <div class="divider-handle" id="divider-handle"></div>

    <div class="right-pane" id="right-pane">
      <div id="works-feed"><div class="loading">Loading feed...</div></div>
      <div class="detail-view" id="detail-view">
        <div class="detail-header">
          <div id="detail-title"></div>
          <button class="detail-back" onclick="closeDetail()">← Back</button>
        </div>
        <img class="detail-main-img" id="detail-img" src="">
        <div id="detail-desc" class="detail-text"></div>
      </div>
    </div>
  </div>
</div>

<script>
let lastFeedScrollPos = 0;

// Straight, Snappy Transition
function openDetail(item, clickedImg) {
  const feed = document.getElementById('works-feed');
  const detail = document.getElementById('detail-view');
  const rightPane = document.getElementById('right-pane');
  const detailImg = document.getElementById('detail-img');

  lastFeedScrollPos = rightPane.scrollTop;
  
  document.getElementById('detail-title').textContent = item.title + (item.year ? ' — ' + item.year : '');
  detailImg.src = resolveImageSrc(item.image);
  
  let desc = (item.description || "");
  if (item.material || item.dimensions) {
    desc += "\n\n" + [item.material, item.dimensions].filter(Boolean).join(" — ");
  }
  document.getElementById('detail-desc').textContent = desc.trim();

  // Highlight row
  document.querySelectorAll('.work-row').forEach(r => r.classList.remove('active'));
  const row = document.querySelector(`.work-row[data-id="${item.id}"]`);
  if (row) row.classList.add('active');

  if (clickedImg) {
    const rect = clickedImg.getBoundingClientRect();
    const clone = clickedImg.cloneNode(true);
    
    Object.assign(clone.style, {
      position: 'fixed',
      top: rect.top + 'px',
      left: rect.left + 'px',
      width: rect.width + 'px',
      height: rect.height + 'px',
      margin: '0',
      zIndex: '1000',
      transition: 'all 0.2s cubic-bezier(0.2, 0, 0.2, 1)',
      pointerEvents: 'none'
    });
    document.body.appendChild(clone);

    clickedImg.style.visibility = 'hidden';
    feed.style.display = 'none';
    detail.style.display = 'block';
    rightPane.scrollTop = 0;
    detailImg.style.visibility = 'hidden';

    const target = detailImg.getBoundingClientRect();

    requestAnimationFrame(() => {
      clone.style.top = target.top + 'px';
      clone.style.left = target.left + 'px';
      clone.style.width = target.width + 'px';
      clone.style.height = target.height + 'px';
    });

    setTimeout(() => {
      detailImg.style.visibility = 'visible';
      clickedImg.style.visibility = 'visible';
      clone.remove();
    }, 200);
  } else {
    feed.style.display = 'none';
    detail.style.display = 'block';
    rightPane.scrollTop = 0;
  }
}

function closeDetail() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('works-feed').style.display = 'block';
  document.getElementById('right-pane').scrollTop = lastFeedScrollPos;
  document.querySelectorAll('.work-row').forEach(r => r.classList.remove('active'));
}

// Full Data Engine Restored
function resolveImageSrc(image) {
  if (!image) return '';
  if (typeof image === 'string') return image;
  if (image.type === 'base64') return image.data;
  return 'images/' + image.name;
}

function renderApp(allItems, siteData) {
  const name = siteData.name || 'Boaz Hoek';
  document.getElementById('artist-name-display').textContent = name;
  document.getElementById('mobile-artist-name').textContent = name;
  document.getElementById('bio-text').textContent = siteData.bio || '';

  let contactHtml = '';
  if (siteData.email) contactHtml += `<p><a href="mailto:${siteData.email}">${siteData.email}</a></p>`;
  if (siteData.location) contactHtml += `<p>${siteData.location}</p>`;
  document.getElementById('contact-block').innerHTML = contactHtml;

  const published = allItems.filter(i => !i.draft).sort((a,b) => (b.year||0)-(a.year||0));

  document.getElementById('works-list').innerHTML = published.map(item =>
    `<div class="work-row" data-id="${item.id}" onclick='openDetail(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
      <span>${item.title}</span><span>${item.series||''}</span><span>${item.year||''}</span>
    </div>`).join('');

  document.getElementById('works-feed').innerHTML = published.map(item =>
    `<div class="feed-item">
      <img src="${resolveImageSrc(item.image)}" onclick='openDetail(${JSON.stringify(item).replace(/'/g, "&apos;")}, this)'>
      <div class="feed-item-meta"><span>${item.title}</span><span>${item.year||''}</span></div>
      ${item.material ? `<div class="feed-item-medium">${item.material}</div>` : ''}
    </div>`).join('');
}

async function loadData() {
  try {
    const siteRes = await fetch('site.json');
    const site = await siteRes.json();
    const years = site.years || [2024, 2025, 2026];
    let allItems = [];
    for (const y of years) {
      try {
        const r = await fetch(`data/portfolio-${y}.json`);
        if (r.ok) allItems = allItems.concat(await r.json());
      } catch(e) {}
    }
    renderApp(allItems, site);
  } catch(e) { console.error("Data load failed", e); }
}

function toggleInfo() {
  const dropdown = document.getElementById('info-dropdown');
  const btn = document.getElementById('info-toggle-btn');
  dropdown.classList.toggle('open');
  btn.classList.toggle('active');
}
function toggleMobileMenu() { document.getElementById('left-pane').classList.toggle('mobile-open'); }

// Cursor & Divider with Limits
(function() {
  const c = document.getElementById('cursor');
  document.addEventListener('mousemove', e => { c.style.left = e.clientX+'px'; c.style.top = e.clientY+'px'; });
  document.addEventListener('mouseover', e => document.body.classList.toggle('cursor-hover', !!e.target.closest('button, .work-row, img, a')));
  
  const h = document.getElementById('divider-handle'), l = document.getElementById('left-pane'), b = document.getElementById('body');
  let drag = false, startX = 0, startW = 0;
  const MIN_PCT = 20; // Minimum left pane width
  const MAX_PCT = 80; // Maximum left pane width
  
  h.addEventListener('mousedown', (e) => {
    drag = true;
    startX = e.clientX;
    startW = l.offsetWidth;
    h.classList.add('dragging');
    document.body.classList.add('cursor-resizing');
    document.body.classList.remove('cursor-hover');
  });
  
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    const totalW = b.offsetWidth;
    const delta = e.clientX - startX;
    let newW = startW + delta;
    const minW = totalW * MIN_PCT / 100;
    const maxW = totalW * MAX_PCT / 100;
    newW = Math.max(minW, Math.min(maxW, newW));
    l.style.width = newW + 'px';
  });
  
  document.addEventListener('mouseup', () => {
    if (!drag) return;
    drag = false;
    h.classList.remove('dragging');
    document.body.classList.remove('cursor-resizing');
  });
})();

window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
