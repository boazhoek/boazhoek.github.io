<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boaz Hoek</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Custom cursor ─── */
    @media (pointer: fine) {
      * { cursor: none !important; }
      .divider-handle { cursor: col-resize !important; }
    }
    #cursor {
      position: fixed; top: 0; left: 0; z-index: 9999;
      pointer-events: none; width: 0; height: 0;
    }
    #cursor-crosshair {
      position: absolute;
      width: 16px; height: 16px;
      transform: translate(-50%, -50%);
      transition: transform .15s ease;
    }
    #cursor-crosshair::before,
    #cursor-crosshair::after {
      content: ''; position: absolute; background: #111;
    }
    #cursor-crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
    #cursor-crosshair::after  { width: 100%; height: 1px; top: 50%; left: 0; }
    body.cursor-hover    #cursor-crosshair { transform: translate(-50%, -50%) rotate(45deg) scale(1.5); }
    body.cursor-resizing #cursor-crosshair { transform: translate(-50%, -50%) rotate(90deg) scale(1.4); }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #111; background: #fff; font-size: 13px;
      line-height: 1.3; overflow: hidden; height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    ::selection { background: #111; color: #f0f0f0; }

    /* ─── Page load ─── */
    .app {
      display: flex; flex-direction: column;
      height: 100vh; width: 100vw;
      opacity: 0; transition: opacity .4s ease;
    }
    .app.loaded { opacity: 1; }

    /* ─── Mobile header ─── */
    .mobile-header {
      display: none; flex-shrink: 0;
      justify-content: space-between; align-items: center;
      padding: 8px 10px 7px; border-bottom: 1px solid #111;
      font-size: 14px; background: #fff; z-index: 50;
    }
    .mobile-header-right { display: flex; gap: 14px; align-items: center; }
    .mobile-header-right a, .mobile-header-right button {
      background: none; border: none; font: inherit; font-size: 14px; color: #111;
    }
    .mobile-header-right a:hover, .mobile-header-right button:hover { text-decoration: underline; }

    .body { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* ─── Left pane ─── */
    .left-pane {
      width: 50%; display: flex; flex-direction: column;
      overflow: hidden; flex-shrink: 0;
    }

    /* ─── Artist name row ─── */
    .artist-name-row {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 5px 10px; border-bottom: 1px solid #111;
      flex-shrink: 0;
    }
    .artist-name {
      font-size: 13px; font-weight: 500;
    }
    .info-toggle {
      background: none; border: none; font: inherit;
      font-size: 13px; font-weight: 500; color: #111;
      letter-spacing: 0;
    }
    .info-toggle:hover { opacity: .5; }

    /* ─── Info dropdown ─── */
    .info-dropdown {
      overflow: hidden;
      max-height: 0;
      flex-shrink: 0;
      transition: max-height .38s cubic-bezier(.4,0,.2,1);
    }
    .info-dropdown.open {
      max-height: 220px;
      border-bottom: 1px solid #111;
    }
    .info-dropdown-inner {
      padding: 14px 10px 18px;
      font-size: 13px; font-weight: 500;
      line-height: 1.9;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity .25s ease .1s, transform .25s ease .1s;
    }
    .info-dropdown.open .info-dropdown-inner {
      opacity: 1;
      transform: none;
    }
    .info-dropdown-inner p + p { margin-top: 0; }
    .info-dropdown-inner a { border-bottom: 1px solid #ccc; transition: border-color .15s; }
    .info-dropdown-inner a:hover { border-color: #111; }

    /* ─── Table ─── */
    .table-header {
      display: grid; grid-template-columns: 40% 37% 23%;
      padding: 7px 10px 6px; border-bottom: 1px solid #111;
      font-weight: 500; font-size: 13px; background: #fff; flex-shrink: 0;
    }
    .works-list { flex: 1; overflow-y: auto; }
    .works-list::-webkit-scrollbar { width: 3px; }
    .works-list::-webkit-scrollbar-thumb { background: #ccc; }

    .work-row {
      display: grid; grid-template-columns: 40% 37% 23%;
      padding: 6px 10px 5px; border-bottom: 1px solid #111;
      font-size: 13px; align-items: start;
      transition: background .18s ease, color .18s ease;
      position: relative; overflow: hidden;
    }
    .work-row:hover { background: rgba(0,0,0,.035); }
    .work-row.active { background: #111; color: #fff; }
    .work-row span { padding-right: 8px; position: relative; z-index: 1; }

    /* ─── Divider handle ─── */
    .divider-handle {
      width: 9px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
      margin-left: -1px;
      cursor: col-resize !important;
    }
    .divider-handle::before {
      content: '';
      position: absolute;
      left: 4px; top: 0; bottom: 0;
      width: 1px;
      background: #111;
      transition: background .15s;
    }
    .divider-handle:hover::before,
    .divider-handle.dragging::before { background: #555; }

    /* ─── Right pane ─── */
    .right-pane { flex: 1; overflow-y: auto; background: #fff; padding: 18px 16px 10px; min-width: 0; }
    .right-pane::-webkit-scrollbar { width: 3px; }
    .right-pane::-webkit-scrollbar-thumb { background: #ccc; }

    /* ─── Feed ─── */
    .feed-item {
      margin-bottom: 44px;
      opacity: 0; transform: translateY(10px);
      transition: opacity .5s cubic-bezier(.4,0,.2,1), transform .5s cubic-bezier(.4,0,.2,1);
    }
    .feed-item.visible { opacity: 1; transform: none; }
    .feed-item img {
      width: 100%; height: auto; display: block;
      transition: opacity .25s ease, transform .4s cubic-bezier(.4,0,.2,1);
      transform-origin: center bottom;
    }
    .feed-item img:hover { opacity: .9; transform: scale(1.005); }
    .feed-item-meta {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-top: 9px; padding-top: 0;
      font-size: 13px; font-weight: 500;
    }
    .feed-item-medium { font-size: 12px; color: #888; margin-top: 4px; }

    /* ─── Detail view — slides in from right ─── */
    .detail-view {
      display: none;
      opacity: 0;
      transform: translateX(14px);
      transition: opacity .32s cubic-bezier(.4,0,.2,1), transform .32s cubic-bezier(.4,0,.2,1);
    }
    .detail-view.visible { opacity: 1; transform: none; }
    .detail-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 18px; padding-bottom: 0;
      font-size: 13px; font-weight: 500;
    }
    .detail-back {
      background: none; border: none; font: inherit; font-size: 13px;
      color: #111; text-transform: uppercase; letter-spacing: .03em; position: relative;
      transition: opacity .15s ease;
    }
    .detail-back::after {
      content: ''; position: absolute; left: 0; bottom: -1px;
      width: 0; height: 1px; background: #111;
      transition: width .22s cubic-bezier(.4,0,.2,1);
    }
    .detail-back:hover { opacity: .6; }
    .detail-back:hover::after { width: 100%; }
    .detail-main-img {
      width: 100%; height: auto; display: block; margin-bottom: 22px;
      transition: opacity .3s ease;
    }
    .detail-main-img.loading-img { opacity: 0; }
    .detail-text {
      font-size: 13px; line-height: 1.8; color: #333;
      max-width: 600px; margin-bottom: 28px; white-space: pre-wrap;
    }
    .detail-extra-imgs img { width: 100%; height: auto; display: block; margin-bottom: 14px; }

    .loading { padding: 40px 12px; color: #999; font-size: 13px; }
    .empty-hint { padding: 40px 12px; color: #bbb; font-size: 12px; line-height: 1.8; }

    /* ─── Mobile ─── */
    @media (max-width: 767px) {
      #cursor { display: none; }
      body { overflow: auto; }
      .app { height: auto; overflow: auto; }
      .mobile-header { display: flex; }
      .body { flex-direction: column; }
      .left-pane { width: 100% !important; overflow: visible; display: none; }
      .left-pane.mobile-open { display: flex; }
      /* Hide artist name inside left pane on mobile — already in mobile header */
      .artist-name-row { display: none; }
      .divider-handle { display: none; }
      .right-pane { padding: 10px 8px; overflow: visible; flex: none; width: 100%; }
      .mobile-info-text { padding: 12px 8px 20px; font-size: 14px; line-height: 1.5; }
    }
    @media (min-width: 768px) {
      .mobile-header { display: none; }
      .mobile-info-text { display: none !important; }
      .left-pane { display: flex !important; }
    }
  </style>
</head>
<body>

<div id="cursor"><div id="cursor-crosshair"></div></div>

<div class="app" id="app">

  <div class="mobile-header">
    <div id="mobile-artist-name">Boaz Hoek</div>
    <div class="mobile-header-right">
      <a href="https://instagram.com/" class="ig-link">Instagram</a>
      <button id="mobile-menu-btn" onclick="toggleMobileMenu()">Menu</button>
    </div>
  </div>

  <div class="body" id="body">

    <div class="left-pane" id="left-pane">

      <div class="artist-name-row">
        <div class="artist-name" id="artist-name-display">Boaz Hoek</div>
        <button class="info-toggle" id="info-toggle-btn" onclick="toggleInfo()">Info</button>
      </div>

      <div class="info-dropdown" id="info-dropdown">
        <div class="info-dropdown-inner">
          <p id="bio-text"></p>
          <div id="contact-block"></div>
        </div>
      </div>

      <div class="table-header">
        <div>Title</div>
        <div>Series</div>
        <div>Year</div>
      </div>
      <div class="works-list" id="works-list">
        <div class="loading">Loading…</div>
      </div>
    </div>

    <div class="divider-handle" id="divider-handle"></div>

    <div class="right-pane" id="right-pane">
      <div class="mobile-info-text" id="mobile-info-text"></div>
      <div id="works-feed"><div class="loading">Loading…</div></div>
      <div class="detail-view" id="detail-view">
        <div class="detail-header">
          <div id="detail-title"></div>
          <button class="detail-back" onclick="closeDetail()">← Back</button>
        </div>
        <img class="detail-main-img" id="detail-img" src="" alt="">
        <div class="detail-text" id="detail-desc"></div>
        <div id="detail-extras"></div>
      </div>
    </div>

  </div>
</div>

<script>
let lastFeedScrollPos = 0; // Remembers scroll position in feed

// ─── Cursor ──────────────────────────────────
(function() {
  const el = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    el.style.left = e.clientX + 'px';
    el.style.top  = e.clientY + 'px';
  });
  document.addEventListener('mouseover', e => {
    const hit = e.target.closest('a, button, .work-row, img');
    document.body.classList.toggle('cursor-hover', !!hit);
  });
})();

// ─── Draggable divider ────────────────────────
(function() {
  const handle    = document.getElementById('divider-handle');
  const leftPane  = document.getElementById('left-pane');
  const body      = document.getElementById('body');
  let dragging = false, startX = 0, startW = 0;

  const MIN_PCT = 25; // left pane min %
  const MAX_PCT = 50; // left pane max %

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = leftPane.offsetWidth;
    handle.classList.add('dragging');
    document.body.classList.add('cursor-resizing');
    document.body.classList.remove('cursor-hover');
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const totalW = body.offsetWidth;
    const delta  = e.clientX - startX;
    let newW = startW + delta;
    const minW = totalW * MIN_PCT / 100;
    const maxW = totalW * MAX_PCT / 100;
    newW = Math.max(minW, Math.min(maxW, newW));
    leftPane.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.classList.remove('cursor-resizing');
  });
})();

// ─── Info dropdown ────────────────────────────
function toggleInfo() {
  const dropdown = document.getElementById('info-dropdown');
  const btn      = document.getElementById('info-toggle-btn');
  const open = dropdown.classList.toggle('open');
  btn.textContent = open ? 'Close' : 'Info';
}

// ─── Mobile menu ─────────────────────────────
function toggleMobileMenu() {
  const pane = document.getElementById('left-pane');
  const btn  = document.getElementById('mobile-menu-btn');
  const open = pane.classList.toggle('mobile-open');
  btn.textContent = open ? 'Close' : 'Menu';
}

// ─── Helpers ─────────────────────────────────
function resolveImageSrc(image) {
  if (!image) return '';
  if (typeof image === 'string') return image;
  if (image.type === 'base64') return image.data;
  if (image.type === 'file')   return 'images/' + image.name;
  return '';
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Detail open/close ───────────────────────
function openDetail(item, clickedImg) {
  const src = resolveImageSrc(item.image);
  document.getElementById('detail-title').textContent = item.title + (item.year ? '  —  ' + item.year : '');

  const img = document.getElementById('detail-img');
  img.src = src;
  img.alt = item.title;

  let desc = '';
  if (item.description) desc += item.description;
  if (item.material || item.dimensions)
    desc += '\n\n' + [item.material, item.dimensions].filter(Boolean).join(' — ');
  document.getElementById('detail-desc').textContent = desc.trim();
  document.getElementById('detail-extras').innerHTML = '';

  const feed = document.getElementById('works-feed');
  const detail = document.getElementById('detail-view');
  const rightPane = document.getElementById('right-pane');

  // Highlight active row in left pane
  document.querySelectorAll('.work-row').forEach(r => r.classList.remove('active'));
  const row = document.querySelector('.work-row[data-id="' + item.id + '"]');
  if (row) row.classList.add('active');

  if (window.innerWidth < 768) {
    document.getElementById('left-pane').classList.remove('mobile-open');
    document.getElementById('mobile-menu-btn').textContent = 'Menu';
  }

  // Save scroll position before switching views
  lastFeedScrollPos = rightPane.scrollTop;

  // --- SEAMLESS IMAGE TRANSITION LOGIC ---
  if (clickedImg && clickedImg.tagName === 'IMG') {
    // 1. Get starting coordinates of the clicked feed image
    const startRect = clickedImg.getBoundingClientRect();

    // 2. Create a temporary clone to animate
    const clone = clickedImg.cloneNode(true);
    clone.style.position = 'fixed';
    clone.style.top = startRect.top + 'px';
    clone.style.left = startRect.left + 'px';
    clone.style.width = startRect.width + 'px';
    clone.style.height = startRect.height + 'px';
    clone.style.zIndex = '9999';
    clone.style.margin = '0';
    clone.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
    clone.style.objectFit = 'cover';
    document.body.appendChild(clone);

    // Hide original image temporarily
    clickedImg.style.visibility = 'hidden';

    // 3. Prep the DOM instantly to get target coordinates
    feed.style.display = 'none';
    detail.style.display = 'block';
    img.style.visibility = 'hidden'; // Hide actual detail image while clone moves
    rightPane.scrollTop = 0; // Reset scroll for detail view

    // Get target coordinates from the newly visible detail image
    const targetRect = img.getBoundingClientRect();

    // 4. Trigger the clone animation to fly to the target
    requestAnimationFrame(() => {
      clone.style.top = targetRect.top + 'px';
      clone.style.left = targetRect.left + 'px';
      clone.style.width = targetRect.width + 'px';
      clone.style.height = targetRect.height + 'px';
      detail.classList.add('visible'); // Fades in the text/header
    });

    // 5. Cleanup after animation finishes
    setTimeout(() => {
      img.style.visibility = 'visible';
      clickedImg.style.visibility = 'visible';
      clone.remove();
    }, 400);

  } else {
    // Fallback logic for Left Pane clicks (simple crossfade)
    feed.style.opacity = '0';
    setTimeout(() => {
      feed.style.display = 'none';
      feed.style.opacity = '1';
      detail.style.display = 'block';
      rightPane.scrollTop = 0;
      requestAnimationFrame(() => detail.classList.add('visible'));
    }, 220);
  }
}

function closeDetail() {
  const feed = document.getElementById('works-feed');
  const detail = document.getElementById('detail-view');
  const rightPane = document.getElementById('right-pane');
  
  detail.classList.remove('visible');
  
  setTimeout(() => {
    detail.style.display = 'none';
    feed.style.display = 'block';
    
    // Restore the user's scroll position in the feed
    rightPane.scrollTop = lastFeedScrollPos;
    
    feed.style.opacity = '0';
    feed.style.transform = 'translateY(10px)';
    feed.style.transition = 'opacity .3s cubic-bezier(.4,0,.2,1), transform .3s cubic-bezier(.4,0,.2,1)';
    
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        feed.style.opacity = '1';
        feed.style.transform = 'none';
        setTimeout(() => { 
          feed.style.transition = ''; 
          feed.style.transform = ''; 
        }, 320);
      });
    });
  }, 250);
  
  document.querySelectorAll('.work-row').forEach(r => r.classList.remove('active'));
}

// ─── Feed scroll reveal ───────────────────────
function initFeedReveal() {
  if (!('IntersectionObserver' in window)) {
    document.querySelectorAll('.feed-item').forEach(el => el.classList.add('visible'));
    return;
  }
  const io = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) { entry.target.classList.add('visible'); io.unobserve(entry.target); }
    });
  }, { threshold: 0.06 });
  document.querySelectorAll('.feed-item').forEach((el, i) => {
    el.style.transitionDelay = (i * 50) + 'ms';
    io.observe(el);
  });
}

// ─── Render ───────────────────────────────────
function renderApp(allItems, siteData) {
  const name = siteData.name || 'Boaz Hoek';
  document.title = name;
  document.getElementById('artist-name-display').textContent = name;
  document.getElementById('mobile-artist-name').textContent  = name;
  document.getElementById('bio-text').textContent = siteData.bio || '';

  let contactHtml = '';
  if (siteData.representation) contactHtml += '<p>' + (siteData.representationUrl
    ? '<a href="' + escHtml(siteData.representationUrl) + '" target="_blank" rel="noopener noreferrer">' + escHtml(siteData.representation) + '</a>'
    : escHtml(siteData.representation)) + '</p>';
  if (siteData.email) contactHtml += '<p><a href="mailto:' + escHtml(siteData.email) + '">' + escHtml(siteData.email) + '</a></p>';
  if (siteData.location) contactHtml += '<p>' + escHtml(siteData.location) + '</p>';
  document.getElementById('contact-block').innerHTML = contactHtml;

  if (siteData.instagram)
    document.querySelectorAll('.ig-link').forEach(el =>
      el.href = 'https://instagram.com/' + siteData.instagram.replace('@',''));

  const mobileInfo = document.getElementById('mobile-info-text');
  if (siteData.bio)
    mobileInfo.innerHTML = '<p><strong>' + escHtml(name) + '</strong> ' + escHtml(siteData.bio) + '</p>';

  const published = allItems
    .filter(i => !i.draft)
    .sort((a,b) => (b.year||0)-(a.year||0) || (b.id||0)-(a.id||0));

  if (!published.length) {
    document.getElementById('works-list').innerHTML = '<div class="loading">No works yet.</div>';
    document.getElementById('works-feed').innerHTML = '<div class="loading">No works yet.</div>';
    return;
  }

  document.getElementById('works-list').innerHTML = published.map(item =>
    '<div class="work-row" data-id="' + item.id + '" onclick=\'openDetail(' + JSON.stringify(item).replace(/\'/g,"\\'") + ')\'>' +
    '<span>' + escHtml(item.title) + '</span>' +
    '<span>' + escHtml(item.series || '') + '</span>' +
    '<span>' + (item.year || '') + '</span></div>'
  ).join('');

  document.getElementById('works-feed').innerHTML = published.map(item => {
    const src = resolveImageSrc(item.image);
    // NOTE: Added "this" to the openDetail call here so we can grab the clicked image
    return '<div class="feed-item" id="feed-' + item.id + '">' +
      '<img src="' + escHtml(src) + '" alt="' + escHtml(item.title) + '" loading="lazy" onclick=\'openDetail(' + JSON.stringify(item).replace(/\'/g,"\\'") + ', this)\'>' +
      '<div class="feed-item-meta"><span>' + escHtml(item.title) + '</span><span>' + (item.year||'') + '</span></div>' +
      (item.material ? '<div class="feed-item-medium">' + escHtml(item.material) + (item.dimensions ? ' — ' + escHtml(item.dimensions) : '') + '</div>' : '') +
      '</div>';
  }).join('');

  initFeedReveal();
}

// ─── Data loading ────────────────────────────
async function loadData() {
  try {
    var siteRes = await fetch('site.json?_=' + Date.now());
    if (!siteRes.ok) throw new Error('site.json not found');
    var site = await siteRes.json();

    var yearsToTry = (site.years && site.years.length) ? site.years : [];
    if (!yearsToTry.length) {
      var cur = new Date().getFullYear();
      for (var y = 2015; y <= cur + 1; y++) yearsToTry.push(y);
    }

    var allItems = [];
    for (var i = 0; i < yearsToTry.length; i++) {
      try {
        var r = await fetch('data/portfolio-' + yearsToTry[i] + '.json?_=' + Date.now());
        if (r.ok) { var yearItems = await r.json(); allItems = allItems.concat(yearItems); }
      } catch(e) {}
    }

    renderApp(allItems, {
      name:              site.name              || 'Boaz Hoek',
      bio:               site.bio               || '',
      instagram:         site.instagram         || '',
      email:             site.email             || '',
      representation:    site.representation    || '',
      representationUrl: site.representationUrl || '',
      location:          site.location          || ''
    });

  } catch(e) {
    renderApp([], { name: 'Boaz Hoek' });
  } finally {
    requestAnimationFrame(() => document.getElementById('app').classList.add('loaded'));
  }
}

window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
